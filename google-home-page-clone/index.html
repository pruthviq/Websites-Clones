<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
  </title>
  <link href="general.css" rel="stylesheet">
  <script src="script.js" type="module">
  </script>
</head>
<!-- ================== BODY ================== -->

<body>

  <header>

    <nav class="page">
      <button class="back-icon">&lt;</button>
      <button class="forward-icon">&gt;</button>
      <button class="reload-icon">@</button>
    </nav>
    <nav class="search">
      <button class="site-info-icon">i</button>
      <input class="search-google-url" placeholder="Search Google or type a URL">
      <button class="bookmark-icon">*</button>
    </nav>
    <nav class="others">
      <button class="extensions-icon">#</button>
      <button class="tab-search-icon">?</button>
      <!-- <button class="downloads-icon"></button> -->
      <button class="energy-saver-icon">%</button>
      <button class="user-icon">U</button>
      <button class="3-dots-icon">:</button>
    </nav>
  </header>

  <main>

    <section>

      <h1>Google</h1>

      <div class="search-container">

        <a class="search-link" target="_self"></a>
        <button class="search-icon-btn">
          <span>🔍</span>
        </button></a>

        <input class="search-google-word" placeholder="Search Google or type a URL">
        <div class="actions">
          <button class="voice-search-btn">🎤</button>
          <button class="image-search-btn">📷</button>
          <button class="ai-mode-btn">AI Mode</button>
        </div>
      </div>
    </section>

    <section class="shortcuts">

      <div class="shortcut-container">
        <button class="add-shortcut-btn">
          +
        </button>
        <p>Add shortcut</p>
      </div>
    </section>

  </main>
</body>

</html>
